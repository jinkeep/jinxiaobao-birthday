<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>祝金小宝生日快乐！🚀</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0D1B2A 0%, #1E3A5F 50%, #0D1B2A 100%);
      font-family: "Noto Sans SC", "Microsoft YaHei", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      cursor: pointer;
      user-select: none;
    }

    /* 星空背景 */
    .stars-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      animation: twinkle var(--duration) ease-in-out infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: var(--min-opacity); transform: scale(1); }
      50% { opacity: 1; transform: scale(1.2); }
    }

    /* 流星 */
    .shooting-star {
      position: absolute;
      width: 100px;
      height: 2px;
      background: linear-gradient(90deg, #00D4FF, transparent);
      opacity: 0;
      animation: shoot 3s ease-in-out infinite;
    }

    @keyframes shoot {
      0% { transform: translateX(-100px) translateY(0) rotate(-45deg); opacity: 0; }
      10% { opacity: 1; }
      30% { opacity: 0; }
      100% { transform: translateX(calc(100vw + 100px)) translateY(100vh) rotate(-45deg); opacity: 0; }
    }

    /* 火箭 */
    .rocket {
      font-size: 60px;
      position: absolute;
      top: 10%;
      right: 15%;
      animation: rocketFloat 4s ease-in-out infinite;
      filter: drop-shadow(0 0 10px #00D4FF);
    }

    @keyframes rocketFloat {
      0%, 100% { transform: translateY(0) rotate(15deg); }
      50% { transform: translateY(-20px) rotate(15deg); }
    }

    /* 标题 */
    .title {
      font-size: 38px;
      font-weight: bold;
      color: #00D4FF;
      margin-bottom: 25px;
      text-shadow: 0 0 20px rgba(0, 212, 255, 0.6),
                   0 0 40px rgba(0, 212, 255, 0.3);
      z-index: 1;
      letter-spacing: 4px;
    }

    /* 祝福卡片 */
    .blessing-card {
      background: linear-gradient(135deg, #1E3A5F 0%, #0D1B2A 100%);
      border-radius: 24px;
      padding: 35px 55px;
      border: 2px solid #00D4FF;
      box-shadow: 0 0 40px rgba(0, 212, 255, 0.3),
                  inset 0 0 30px rgba(0, 212, 255, 0.1);
      text-align: center;
      min-width: 300px;
      position: relative;
      z-index: 1;
      transform-style: preserve-3d;
      perspective: 1000px;
    }

    /* 卡片光效 */
    .blessing-card::before {
      content: '';
      position: absolute;
      top: -2px;
      left: -2px;
      right: -2px;
      bottom: -2px;
      background: linear-gradient(45deg, #00D4FF, #7B68EE, #00D4FF);
      border-radius: 26px;
      z-index: -1;
      opacity: 0.5;
      animation: borderGlow 3s ease-in-out infinite;
    }

    @keyframes borderGlow {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.7; }
    }

    /* 人名展示 */
    .name-display {
      font-size: 52px;
      font-weight: 900;
      min-height: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(90deg, var(--color-start), var(--color-end));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 10px var(--color-start));
      opacity: 0;
      transform: rotateY(90deg) scale(0.5);
      transition: all 0.3s ease;
    }

    .name-display.show {
      animation: flipIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
    }

    @keyframes flipIn {
      0% { opacity: 0; transform: rotateY(90deg) scale(0.5) translateY(30px); }
      60% { opacity: 1; transform: rotateY(-10deg) scale(1.1) translateY(-10px); }
      100% { opacity: 1; transform: rotateY(0) scale(1) translateY(0); }
    }

    /* 星光环绕 */
    .sparkles {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      pointer-events: none;
    }

    .sparkle {
      position: absolute;
      font-size: 16px;
      opacity: 0;
    }

    .sparkle.animate {
      animation: sparkleBurst 0.8s ease-out forwards;
    }

    @keyframes sparkleBurst {
      0% { opacity: 1; transform: scale(0) translate(0, 0); }
      50% { opacity: 1; }
      100% { opacity: 0; transform: scale(1) translate(var(--tx), var(--ty)); }
    }

    /* 爆炸波纹 */
    .ripple {
      position: absolute;
      border-radius: 50%;
      border: 2px solid #00D4FF;
      animation: rippleExpand 0.8s ease-out forwards;
      pointer-events: none;
    }

    @keyframes rippleExpand {
      0% { width: 0; height: 0; opacity: 1; }
      100% { width: 400px; height: 400px; opacity: 0; margin-left: -200px; margin-top: -200px; }
    }

    /* 播放状态 */
    .play-status {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.6);
      margin-top: 15px;
      height: 20px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .play-status.playing {
      opacity: 1;
    }

    /* 提示文字 */
    .hint {
      font-size: 16px;
      color: rgba(255, 255, 255, 0.5);
      margin-top: 25px;
      z-index: 1;
    }

    /* 响应式 */
    @media (max-width: 480px) {
      .title { font-size: 26px; letter-spacing: 2px; }
      .blessing-card { padding: 25px 35px; min-width: 240px; }
      .name-display { font-size: 36px; }
      .rocket { font-size: 40px; top: 5%; right: 10%; }
    }
  </style>
</head>
<body>
  <!-- 星空背景 -->
  <div class="stars-container" id="starsContainer"></div>

  <!-- 流星 -->
  <div id="meteors"></div>

  <!-- 火箭 -->
  <div class="rocket">🚀</div>

  <!-- 标题 -->
  <h1 class="title">✨ 祝金小宝生日快乐 ✨</h1>

  <!-- 祝福卡片 -->
  <div class="blessing-card" id="blessingCard">
    <div class="sparkles" id="sparkles"></div>
    <div class="name-display" id="nameDisplay">👆</div>
    <div class="play-status" id="playStatus">🔊 播放中...</div>
  </div>

  <!-- 提示 -->
  <p class="hint">👆 点击页面随机抽取祝福</p>

  <script>
    // 祝福数据 - V1.3 新增大聪明，语音改为播报人名
    const blessings = [
      { name: '妈妈', colorStart: '#FF69B4', colorEnd: '#FFB6C1' },
      { name: '爸爸', colorStart: '#00D4FF', colorEnd: '#00FFFF' },
      { name: '大宝', colorStart: '#FFD700', colorEnd: '#FFA500' },
      { name: '小宝', colorStart: '#7B68EE', colorEnd: '#9370DB' },
      { name: '大聪明', colorStart: '#4CAF50', colorEnd: '#8BC34A' }  // 新增
    ];

    const nameDisplay = document.getElementById('nameDisplay');
    const playStatus = document.getElementById('playStatus');
    const blessingCard = document.getElementById('blessingCard');
    const sparkles = document.getElementById('sparkles');

    // 创建星空
    function createStars() {
      const container = document.getElementById('starsContainer');
      for (let i = 0; i < 80; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.width = Math.random() * 4 + 2 + 'px';
        star.style.height = star.style.width;
        star.style.setProperty('--duration', (Math.random() * 2 + 2) + 's');
        star.style.setProperty('--min-opacity', Math.random() * 0.3 + 0.1);
        star.style.animationDelay = Math.random() * 5 + 's';
        container.appendChild(star);
      }
    }

    // 创建流星
    function createMeteors() {
      const container = document.getElementById('meteors');
      for (let i = 0; i < 4; i++) {
        const meteor = document.createElement('div');
        meteor.className = 'shooting-star';
        meteor.style.top = Math.random() * 50 + '%';
        meteor.style.left = Math.random() * 30 + '%';
        meteor.style.animationDelay = i * 4 + Math.random() * 3 + 's';
        container.appendChild(meteor);
      }
    }

    // 创建星星爆炸效果
    function createSparkles(x, y) {
      const sparkleChars = ['✨', '⭐', '🌟', '💫', '✦'];
      for (let i = 0; i < 20; i++) {
        const sparkle = document.createElement('div');
        sparkle.className = 'sparkle';
        sparkle.textContent = sparkleChars[Math.floor(Math.random() * sparkleChars.length)];

        const angle = (i / 20) * Math.PI * 2;
        const distance = 50 + Math.random() * 50;
        sparkle.style.setProperty('--tx', Math.cos(angle) * distance + 'px');
        sparkle.style.setProperty('--ty', Math.sin(angle) * distance + 'px');
        sparkle.style.left = '50%';
        sparkle.style.top = '50%';

        sparkles.appendChild(sparkle);

        // 触发动画
        setTimeout(() => sparkle.classList.add('animate'), 10);

        // 清理
        setTimeout(() => sparkle.remove(), 800);
      }
    }

    // 创建波纹效果
    function createRipple() {
      const ripple = document.createElement('div');
      ripple.className = 'ripple';
      blessingCard.appendChild(ripple);
      setTimeout(() => ripple.remove(), 800);
    }

    // 语音合成 - V1.3 改为播报人名
    function speak(text) {
      if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();

        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = 0.9;
        utterance.pitch = 1.1;

        utterance.onstart = () => {
          playStatus.classList.add('playing');
        };

        utterance.onend = () => {
          playStatus.classList.remove('playing');
        };

        window.speechSynthesis.speak(utterance);
      }
    }

    // 随机抽取
    function randomBlessing() {
      // 移除动画类
      nameDisplay.classList.remove('show');

      // 随机选择
      const randomIndex = Math.floor(Math.random() * blessings.length);
      const selected = blessings[randomIndex];

      // 设置颜色
      nameDisplay.style.setProperty('--color-start', selected.colorStart);
      nameDisplay.style.setProperty('--color-end', selected.colorEnd);

      // 更新显示
      nameDisplay.textContent = selected.name;

      // 触发动画
      void nameDisplay.offsetWidth;
      nameDisplay.classList.add('show');

      // 特效
      createSparkles();
      createRipple();

      // V1.3: 播放语音改为播报人名
      speak(selected.name);
    }

    // 初始化
    createStars();
    createMeteors();

    // 点击事件
    document.body.addEventListener('click', randomBlessing);
  </script>
</body>
</html>
