<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>祝金宝生日快乐！🎂</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #FFE4EC 0%, #FFF0F5 50%, #FCE4EC 100%);
      font-family: "Noto Sans SC", "Microsoft YaHei", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      cursor: pointer;
      user-select: none;
    }

    /* 背景装饰 */
    .bubble {
      position: absolute;
      border-radius: 50%;
      opacity: 0.6;
      animation: floatUp 4s ease-in-out infinite;
    }

    @keyframes floatUp {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-30px) rotate(180deg); }
    }

    .star {
      position: absolute;
      font-size: 20px;
      animation: twinkle 2s ease-in-out infinite;
      opacity: 0;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0; transform: scale(0.5); }
      50% { opacity: 1; transform: scale(1.2); }
    }

    /* 蛋糕样式 */
    .cake-container {
      position: relative;
      margin-bottom: 30px;
      animation: wobble 3s ease-in-out infinite;
    }

    @keyframes wobble {
      0%, 100% { transform: rotate(-2deg); }
      50% { transform: rotate(2deg); }
    }

    .cake {
      font-size: 100px;
      filter: drop-shadow(0 10px 20px rgba(233, 30, 99, 0.3));
    }

    /* 标题 */
    .title {
      font-size: 32px;
      color: #E91E63;
      margin-bottom: 20px;
      text-shadow: 2px 2px 4px rgba(233, 30, 99, 0.2);
      font-weight: bold;
    }

    /* 祝福卡片 */
    .blessing-card {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 24px;
      padding: 30px 50px;
      box-shadow: 0 10px 40px rgba(233, 30, 99, 0.15);
      border: 3px solid #FFD700;
      text-align: center;
      min-width: 280px;
      position: relative;
      overflow: hidden;
    }

    .name-display {
      font-size: 48px;
      font-weight: bold;
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    .name-display.appear {
      animation: nameAppear 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }

    @keyframes nameAppear {
      0% { transform: scale(0.5) translateY(20px); opacity: 0; }
      60% { transform: scale(1.15) translateY(-10px); }
      100% { transform: scale(1) translateY(0); opacity: 1; }
    }

    /* 人名颜色 */
    .name-mom { color: #E91E63; }
    .name-dad { color: #2196F3; }
    .name-dabao { color: #FF9800; }
    .name-xiaobao { color: #9C27B0; }

    /* 播放状态 */
    .play-status {
      font-size: 14px;
      color: #888;
      margin-top: 10px;
      height: 20px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .play-status.playing {
      opacity: 1;
    }

    /* 提示文字 */
    .hint {
      font-size: 16px;
      color: #999;
      margin-top: 20px;
    }

    /* 点击反馈 */
    body:active {
      transform: scale(0.98);
    }

    /* 响应式 */
    @media (max-width: 480px) {
      .title { font-size: 24px; }
      .cake { font-size: 70px; }
      .blessing-card { padding: 20px 30px; min-width: 220px; }
      .name-display { font-size: 36px; }
    }
  </style>
</head>
<body>
  <!-- 背景装饰 -->
  <div id="decorations"></div>

  <!-- 蛋糕 -->
  <div class="cake-container">
    <div class="cake">🎂</div>
  </div>

  <!-- 标题 -->
  <h1 class="title">🎉 祝金宝生日快乐！🎉</h1>

  <!-- 祝福卡片 -->
  <div class="blessing-card">
    <div class="name-display" id="nameDisplay">👆</div>
    <div class="play-status" id="playStatus">🔊 播放中...</div>
  </div>

  <!-- 提示 -->
  <p class="hint">👆 点击页面随机抽取祝福</p>

  <script>
    // 祝福数据
    const blessings = [
      { name: '妈妈', class: 'name-mom', text: '祝金宝生日快乐，健康成长！' },
      { name: '爸爸', class: 'name-dad', text: '金宝生日快乐，爸爸妈妈爱你！' },
      { name: '大宝', class: 'name-dabao', text: '妹妹生日快乐，天天开心！' },
      { name: '小宝', class: 'name-xiaobao', text: '祝姐姐生日快乐！' }
    ];

    const nameDisplay = document.getElementById('nameDisplay');
    const playStatus = document.getElementById('playStatus');
    let isSpeaking = false;

    // 语音合成
    function speak(text) {
      if ('speechSynthesis' in window) {
        // 停止之前的语音
        window.speechSynthesis.cancel();
        
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = 0.9;
        utterance.pitch = 1.2;
        
        utterance.onstart = () => {
          playStatus.classList.add('playing');
          isSpeaking = true;
        };
        
        utterance.onend = () => {
          playStatus.classList.remove('playing');
          isSpeaking = false;
        };
        
        window.speechSynthesis.speak(utterance);
      }
    }

    // 随机抽取
    function randomBlessing() {
      // 移除动画类
      nameDisplay.classList.remove('appear');
      
      // 随机选择
      const randomIndex = Math.floor(Math.random() * blessings.length);
      const selected = blessings[randomIndex];
      
      // 更新显示
      nameDisplay.textContent = selected.name;
      nameDisplay.className = 'name-display ' + selected.class;
      
      // 重新触发动画
      void nameDisplay.offsetWidth; // 强制重绘
      nameDisplay.classList.add('appear');
      
      // 播放语音
      speak(selected.text);
    }

    // 点击事件
    document.body.addEventListener('click', randomBlessing);

    // 创建背景装饰
    function createDecorations() {
      const container = document.getElementById('decorations');
      const colors = ['#FFB6C1', '#FF69B4', '#FFD700', '#87CEEB', '#DDA0DD'];
      
      // 气泡
      for (let i = 0; i < 15; i++) {
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.style.width = Math.random() * 30 + 15 + 'px';
        bubble.style.height = bubble.style.width;
        bubble.style.left = Math.random() * 100 + '%';
        bubble.style.top = Math.random() * 100 + '%';
        bubble.style.background = colors[Math.floor(Math.random() * colors.length)];
        bubble.style.animationDelay = Math.random() * 4 + 's';
        bubble.style.animationDuration = Math.random() * 2 + 3 + 's';
        container.appendChild(bubble);
      }
      
      // 星星
      const stars = ['✨', '⭐', '🌟'];
      for (let i = 0; i < 10; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.textContent = stars[Math.floor(Math.random() * stars.length)];
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.animationDelay = Math.random() * 5 + 's';
        star.style.animationDuration = Math.random() * 2 + 2 + 's';
        container.appendChild(star);
      }
    }

    createDecorations();
  </script>
</body>
</html>
